<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>古笨港虛擬展廳</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        background: #f4f1ea;
        margin: 0;
      }
      .container {
        position: relative;
        display: inline-block;
        margin-top: 20px;
      }
      img {
        border: 5px solid #8d7652;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 100;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
      }
      .modal-content {
        position: relative;
        margin: 5% auto;
        width: 80%;
        height: 80%;
        background: white;
        border-radius: 10px;
      }
      .close {
        position: absolute;
        right: 20px;
        top: 10px;
        font-size: 30px;
        cursor: pointer;
        color: #333;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <h1>古笨港生活記憶：數位文物互動展</h1>
    <p>點擊畫像中的陶瓷器物，觀看 3D 數位保存成果</p>

    <div class="container">
      <!-- ✅ 使用免費可用歷史風格圖片（可自行替換） -->
      <img src="image/market.jpg" usemap="#map" alt="古笨港市井圖" />

      <map name="map">
        <!-- ✅ 已放可用 Sketchfab 模型 coords=點擊範圍XY座標-->
        <area
          shape="rect"
          coords="224,302,249,338"
          alt="陶瓷碗"
          href="javascript:void(0)"
          onclick="open3D('4b7a910fe4d049bcb9fd4dc65b5c3fd6')"
        />

        <area
          shape="rect"
          coords="534,349,549,374"
          alt="青花盤"
          href="javascript:void(0)"
          onclick="open3D('bd97d3e5623d44dcb83fcc53de550280')"
        />
      </map>
    </div>

    <div id="myModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="viewer-container" style="height: 100%"></div>
      </div>
    </div>

    <script>
      function open3D(modelId) {
        const container = document.getElementById("viewer-container");

        container.innerHTML = `
                <iframe
                    title="3D Model"
                    src="https://sketchfab.com/models/${modelId}/embed"
                    allow="autoplay; fullscreen; xr-spatial-tracking"
                    allowfullscreen
                    webkitallowfullscreen="true"
                    mozallowfullscreen="true">
                </iframe>`;

        document.getElementById("myModal").style.display = "block";
      }

      function closeModal() {
        document.getElementById("myModal").style.display = "none";
        document.getElementById("viewer-container").innerHTML = "";
      }
      document.querySelector("img").addEventListener("click", function (e) {
        const rect = this.getBoundingClientRect();
        const x = Math.round(e.clientX - rect.left);
        const y = Math.round(e.clientY - rect.top);

        console.log(x + "," + y);
      });
    </script>
  </body>
</html>
